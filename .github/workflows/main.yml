name: Ejecucion Mensual BCE

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Añadimos esto explícitamente para asegurar permisos
    permissions:
      contents: write

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.10'

      - name: Instalar librerias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        run: python script.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add historico_usd.csv || echo "No hay archivo para añadir"
          # El commit solo se hace si hay cambios reales
          git commit -m "Actualizacion automatica: $(date)" || echo "No hay cambios para commitear"
          # El truco: 'pull --rebase' trae tus cambios web y pone el CSV encima
          git pull --rebase origin main
          git push origin main
