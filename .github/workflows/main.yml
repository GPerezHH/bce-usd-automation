name: Ejecucion Mensual BCE

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Ejecutar script
        run: python script.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add historico_usd.csv || echo "No hay archivo para añadir"
          git commit -m "Actualizacion automatica: $(date)" || echo "No hay cambios para commitear"
          git pull --rebase origin main
          git push origin main
